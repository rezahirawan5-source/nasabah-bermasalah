<html><body><h2>Daftar Kontak</h2><input id=s oninput='q()'><div></div><script>function q(){let v=s.value.toLowerCase();document.querySelectorAll('.card').forEach(x=>x.style.display=x.innerText.toLowerCase().includes(v)?'':'none')}</script><style>.card{border:1px solid #ccc;padding:8px;margin:8px}</style></body></html>
